version: '3.8'

services:
  rss-bot:
    build: .
    container_name: rss_telegram_bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=BOT_TOKEN_HERE
      - ADMIN_ID=ADMIN_ID_HERE
      - PREMIUM_FEEDS_LIMIT=5
      - FREEMIUM_FEEDS_LIMIT=2
    volumes:
      - ./database:/app/database
      - ./constants:/app/constants
