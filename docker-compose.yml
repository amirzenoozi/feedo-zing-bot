version: '3.8'

services:
  rss-bot:
    image: amirzenoozi/rss-bot:latest
    container_name: rss_telegram_bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=BOT_TOKEN_HERE
      - ADMIN_ID=ADMIN_ID_HERE
    volumes:
      - ./database:/app/database
      - ./constants:/app/constants
